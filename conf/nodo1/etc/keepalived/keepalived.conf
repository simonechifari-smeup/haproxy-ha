# /etc/keepalived/keepalived.conf  —  NODO 1 (MASTER)
# Sostituire tutti i placeholder <...> prima del deploy.

global_defs {
    router_id HAPROXY_NODE1
    enable_script_security
    script_user root
}

vrrp_script chk_haproxy {
    script   "/etc/keepalived/check_haproxy.sh"
    interval 2       # controlla ogni 2s
    timeout  3
    fall     2       # 2 fail consecutivi → HAProxy down
    rise     2       # 2 success consecutivi → HAProxy up
    weight   -20     # down: prio 110 → 90 < 100 (BACKUP) → cede VIP
}

vrrp_instance VI_FRONTEND {
    state             MASTER
    interface         ens192          # NIC rete frontend/gestione
    virtual_router_id 51              # stesso valore su entrambi i nodi
    priority          110             # MASTER: più alto del BACKUP (100)
    advert_int        1

    authentication {
        auth_type PASS
        auth_pass <VRRP_PASSWORD>     # >>> CAMBIARE <<< max 8 caratteri, uguale su entrambi
    }

    # VRRP unicast (non richiede multicast sullo switch)
    unicast_src_ip  <NODE1_MGMT_IP>   # IP ens192 di questo nodo
    unicast_peer {
        <NODE2_MGMT_IP>               # IP ens192 del nodo 2
    }

    virtual_ipaddress {
        <VIP_IP>/24 dev ens192        # VIP: non assegnare staticamente
    }

    track_script {
        chk_haproxy
    }
}
