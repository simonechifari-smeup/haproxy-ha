#---------------------------------------------------------------------
# /opt/haproxy/haproxy.cfg
# Modo HTTP (Layer 7) - TLS terminato a monte (es. NetScaler, F5, nginx)
# Frontend :80 (HTTP) -> Backend StoreFront :80
# Config IDENTICA sui due nodi.
#---------------------------------------------------------------------

global
    log stdout format raw local0 info
    maxconn 20000
    stats socket /var/run/haproxy/haproxy.sock mode 660 level admin
    stats timeout 30s
    # I worker degradano a utente non-root dopo il bind
    user  haproxy
    group haproxy

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    timeout tunnel  1h
    retries 3

#---------------------------------------------------------------------
# Pagina statistiche — limitare l'accesso via firewall
#---------------------------------------------------------------------
frontend fe_stats
    mode  http
    bind  0.0.0.0:8404
    stats enable
    stats uri     /stats
    stats refresh 10s
    stats show-node
    stats admin if TRUE
    stats auth admin:<STATS_PASSWORD>   # >>> CAMBIARE <<<

#---------------------------------------------------------------------
# Frontend HTTP (riceve traffico dal load balancer a monte)
#---------------------------------------------------------------------
frontend fe_http
    mode    http
    bind    0.0.0.0:80
    option  httplog
    option  forwardfor   # X-Forwarded-For con il vero IP client
    default_backend be_storefront

#---------------------------------------------------------------------
# Backend StoreFront — sticky session obbligatoria con multi-server
#---------------------------------------------------------------------
backend be_storefront
    mode        http
    balance     roundrobin
    cookie      SF_STICK insert indirect nocache
    default-server inter 3s fall 3 rise 2
    server sf1 <STOREFRONT1_IP>:80 check cookie sf1   # >>> SOSTITUIRE <<<
    server sf2 <STOREFRONT2_IP>:80 check cookie sf2   # >>> SOSTITUIRE <<<
